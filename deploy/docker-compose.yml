services:
  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    environment:
      PORT: 4000
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      AI_PROVIDER: ${AI_PROVIDER:-codex-cli}
      CODEX_BIN: ${CODEX_BIN:-codex}
      CODEX_MODEL: ${CODEX_MODEL:-}
      CODEX_TIMEOUT_MS: ${CODEX_TIMEOUT_MS:-180000}
      CODEX_HOME: /root/.codex
    ports:
      - "127.0.0.1:44000:4000"
    volumes:
      - bookwise-data:/app/data
      - ${CODEX_HOME_DIR:-/home/Biglone/.codex}:/root/.codex
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    environment:
      PORT: 3000
      API_INTERNAL_URL: http://backend:4000
    depends_on:
      - backend
    ports:
      - "127.0.0.1:33000:3000"
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:2026.7.0
    command: tunnel --config /etc/cloudflared/config.yml --no-autoupdate run
    volumes:
      - ./cloudflared/config.yml:/etc/cloudflared/config.yml:ro
      - ./cloudflared/credentials.json:/etc/cloudflared/credentials.json:ro
    depends_on:
      - frontend
    restart: unless-stopped

volumes:
  bookwise-data:
